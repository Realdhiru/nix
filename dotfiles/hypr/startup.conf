# ~/nix/dotfiles/hypr/startup.conf
exec-once = ~/nix/dotfiles/hypr/scripts/lock.sh
exec-once = bash -c '~/nix/dotfiles/hypr/scripts/set_wallpaper.sh "$(cat ~/.cache/current_wallpaper.txt)"'
# Initialize the persistent graphics background cache layer
exec-once = awww-daemon --format xrgb

# Idle
exec-once = hypridle
# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Quickshell
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Shell.qml
# Focus timer daemon
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py
exec-once = ~/nix/dotfiles/hypr/scripts/quickshell/music/equalizer.sh --init

exec-once = hyprctl setcursor Bibata-Modern-Ice 24