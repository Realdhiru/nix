# ~/nix/dotfiles/hypr/startup.conf

# 1. Critical: Sync Wayland environment to D-Bus so browsers can send notifications
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. Critical: Kill competing legacy notification daemons to free the D-Bus namespace for Quickshell
exec-once = killall -q dunst mako swaync hyprnotify || true

exec-once = ~/nix/dotfiles/hypr/scripts/lock.sh
exec-once = bash -c '~/nix/dotfiles/hypr/scripts/set_wallpaper.sh "$(cat ~/.cache/current_wallpaper.txt)"'
# Initialize the persistent graphics background cache layer
exec-once = awww-daemon --format xrgb

# Idle
exec-once = hypridle
# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Quickshell
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Shell.qml
# Focus timer daemon
exec-once = bash ~/.config/hypr/scripts/quickshell/focustime/launch_daemon.sh
exec-once = ~/nix/dotfiles/hypr/scripts/quickshell/music/equalizer.sh --init

# 3. Simple Low Battery Watcher (Alerts when discharging and <= 20%)
exec-once = bash -c 'while true; do if [ -d /sys/class/power_supply/BAT* ]; then cap=$(cat /sys/class/power_supply/BAT*/capacity | head -n1); stat=$(cat /sys/class/power_supply/BAT*/status | head -n1); if [ "$stat" = "Discharging" ] && [ "$cap" -le 20 ]; then notify-send -u critical -a "System" -i battery-empty "Low Battery" "Battery is at ${cap}%"; sleep 300; fi; fi; sleep 60; done'

exec-once = hyprctl setcursor Bibata-Modern-Ice 24