# ======================================================
# Opacity
# ======================================================

windowrule = opacity 0.52, match:class ^org\.wezfurlong\.wezterm$
windowrule = opacity 0.63, match:class ^codium$
windowrule = opacity 0.92, match:class ^thunar$

# Brave Apps
windowrule = opacity 0.55, match:class ^brave-chat\.openai\.com__-Default$                         # ChatGPT
windowrule = opacity 0.55, match:class ^brave-gemini\.google\.com__app-Default$                    # Gemini
windowrule = opacity 0.55, match:class ^brave-claude\.ai__new-Default$                             # Claude
windowrule = opacity 0.50, match:class ^brave-monkeytype\.com__-Default$                           # Monkeytype
windowrule = opacity 0.55, match:class ^brave-www\.notion\.so__02917993852a4825ab25a38c938de4f8-Default$ # Notion

# Spotify Lyrics (Chromium)
windowrule = opacity 0.80, match:class ^Chromium-browser$


# ======================================================
# Global Rules
# ======================================================

# Ignore maximize requests from applications
windowrule = match:class .*, suppress_event maximize

# Prevent focus issues with transient XWayland windows
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, no_focus on


# ======================================================
# Bluetooth Manager
# ======================================================

windowrule = match:class ^(\.blueman-manager-wrapped)$, float on
windowrule = match:class ^(\.blueman-manager-wrapped)$, center on
windowrule = match:class ^(\.blueman-manager-wrapped)$, size 700 500
# windowrule = match:class ^(\.blueman-manager-wrapped)$, pin on


# ======================================================
# PipeWire Volume Control
# ======================================================

windowrule = match:class ^(com\.saivert\.pwvucontrol)$, float on
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, center on
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, size 900 600
# windowrule = match:class ^(com\.saivert\.pwvucontrol)$, pin on


# ======================================================
# Picture-in-Picture
# ======================================================

windowrule = match:title ^(.*[Pp][Ii][Cc][Tt][Uu][Rr][Ee].*)$, float on
windowrule = match:title ^(.*[Pp][Ii][Cc][Tt][Uu][Rr][Ee].*)$, pin on
windowrule = match:title ^(.*[Pp][Ii][Cc][Tt][Uu][Rr][Ee].*)$, size 10% 10%

# More generic PiP matcher
# windowrule = float, title:^(.*[Pp]icture.*[Pp]icture.*)$
# windowrule = pin, title:^(.*[Pp]icture.*[Pp]icture.*)$
# windowrule = size 25% 25%, title:^(.*[Pp]icture.*[Pp]icture.*)$
# windowrule = move 73% 72%, title:^(.*[Pp]icture.*[Pp]icture.*)$


# ======================================================
# Quickshell
# ======================================================

windowrule = match:title ^app-launcher$, float on
windowrule = match:title ^app-launcher$, center on
windowrule = match:title ^app-launcher$, size 1200 600


# ======================================================
# Layer Rules
# ======================================================

# Rofi
layerrule = match:namespace ^rofi$, blur on
layerrule = match:namespace ^rofi$, ignore_alpha 0.1
layerrule = match:namespace ^rofi$, animation slide left

# Quickshell (optional)
# layerrule = blur true, match:namespace quickshell-launcher
# layerrule = ignore_alpha 0, match:namespace quickshell-launcher

# layerrule = blur true, match:namespace quickshell-notifications
# layerrule = ignore_alpha 0, match:namespace quickshell-notifications

# layerrule = blur true, match:namespace quickshell-control-center
# layerrule = ignore_alpha 0, match:namespace quickshell-control-center


