# Bluetooth
windowrule = match:class ^(\.blueman-manager-wrapped)$, float on
windowrule = match:class ^(\.blueman-manager-wrapped)$, center on
windowrule = match:class ^(\.blueman-manager-wrapped)$, size 900 700
windowrule = match:class ^(\.blueman-manager-wrapped)$, pin on

# Pipewire Volume Control
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, float on
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, center on
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, size 900 600
windowrule = match:class ^(com\.saivert\.pwvucontrol)$, pin on

## Picture-in-Picture
#windowrule = float,title:^(.*[Pp]icture.*[Pp]icture.*)$
#windowrule = pin,title:^(.*[Pp]icture.*[Pp]icture.*)$
#windowrule = size 25% 25%,title:^(.*[Pp]icture.*[Pp]icture.*)$
#windowrule = move 73% 72%,title:^(.*[Pp]icture.*[Pp]icture.*)$

