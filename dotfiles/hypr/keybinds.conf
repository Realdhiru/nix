$mainMod = SUPER

# Quickshell
# bind = $mainMod, A, exec, ~/.config/hypr/scripts/qs_manager.sh toggle applauncher
bind = $mainMod, N, exec, ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod CTRL, V, exec, ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod SHIFT, escape, exec, ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod ALT, F, exec, ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = CTRL SHIFT, escape, exec, ~/.config/hypr/scripts/qs_manager.sh toggle settings

bind = $mainMod CTRL, M, exec, ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = $mainMod, U, exec, ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, V, exec, ~/.config/hypr/scripts/qs_manager.sh toggle clipboard
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/qs_manager.sh toggle calendar

bind = $mainMod CTRL SHIFT, V, exec, ~/nix/dotfiles/hypr/scripts/fix_audio.sh

bind = $mainMod, R, exec, ~/.config/hypr/scripts/reload.sh
bind = SHIFT, F2, exec, ~/.config/hypr/scripts/lock.sh



# =========================
# Applications
# =========================

bind = $mainMod, T, exec, wezterm
bind = $mainMod SHIFT, T, exec, env SHOW_FETCH=1 wezterm
bind = $mainMod, E, exec, thunar
bind = $mainMod, A, exec, pkill rofi || rofi -show drun
bind = $mainMod, C, exec, codium
bind = $mainMod, B, exec, brave
bind = $mainMod ALT, B, exec, blueman-manager
bind = $mainMod ALT, V, exec, pwvucontrol

# =========================
# Web Apps
# =========================

bind = $mainMod SHIFT, C, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=chatgpt --name=chatgpt --app=https://chat.openai.com

bind = $mainMod SHIFT, A, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=claude --app=https://claude.ai/new

bind = $mainMod SHIFT, G, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=gemini --app=https://gemini.google.com/app

bind = $mainMod ALT, G, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=gmail --app=https://mail.google.com/mail/u/3/#inbox

bind = $mainMod ALT, W, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=whatsapp --app=https://web.whatsapp.com

bind = $mainMod ALT, N, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=notion --app=https://www.notion.so/02917993852a4825ab25a38c938de4f8

bind = $mainMod ALT, Y, exec, brave --ozone-platform=wayland --profile-directory="youtube" --class=youtube --app=https://youtube.com

bind = $mainMod ALT, D, exec, brave --ozoneG-platform=wayland --profile-directory="Default" --class=todo --name=todo --app=https://to-do.live.com/tasks/inbox

# =========================
# Screenshots & Shaders
# =========================

bind = $mainMod CTRL, S, exec, ~/.config/hypr/scripts/cycle-shader.sh
bind = $mainMod SHIFT, Z, exec, grimblast copy area
bind = $mainMod CTRL SHIFT, Z, exec, grimblast --freeze copy area
bind = $mainMod CTRL, R, exec, ~/.config/hypr/scripts/record.sh


# =========================
# Window Actions
# =========================

binddm = $mainMod, Z, $d hold to move window, movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow

bind = $mainMod, Q, killactive
bind = $mainMod, W, togglefloating
bind = $mainMod, P, pseudo

bindd = Shift, F1, $d toggle fullscreen, fullscreen

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
# bindd = $mainMod ALT, S, $d move to scratchpad (silent), movetoworkspacesilent, special

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# =========================
# Media
# =========================

binddl = Shift, F3, $d pause media, exec, playerctl play-pause
binddl = Shift, F4, $d previous media, exec, playerctl previous
binddl = Shift, F5, $d next media, exec, playerctl next

# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous


# =========================
# Audio & Brightness
# =========================

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-


# =========================
# Focus
# =========================

bind = $mainMod SHIFT, F, exec, hyprctl dispatch pin
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# =========================
# Resize Active Window
# =========================

bindde = $mainMod SHIFT, Right, $d resize window right, resizeactive, 30 0
bindde = $mainMod SHIFT, Left, $d resize window left, resizeactive, -30 0
bindde = $mainMod SHIFT, Up, $d resize window up, resizeactive, 0 -30
bindde = $mainMod SHIFT, Down, $d resize window down, resizeactive, 0 30


# =========================
# Workspaces
# =========================

bindd = $mainMod CTRL, Right, $d change active workspace forwards, workspace, r+1
bindd = $mainMod CTRL, Left, $d change active workspace backwards, workspace, r-1
bindd = $mainMod CTRL, Down, $d navigate to nearest empty workspace, workspace, empty

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Zoom In: Uses NF (Number of Fields) to always target the last value regardless of string changes
bindn = $mainMod, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $NF + 0.9}')

# Zoom Out: Instantly flattens back to 1.0 baseline layout
bindn = $mainMod, mouse_down, exec, hyprctl keyword cursor:zoom_factor 1.0

bind = $mainMod, M, exit


