### KEYBINDINGS ###

# Set programs that you use
#$terminal = wezterm
#$fileManager = dolphin
#$menu = rofi -show drun
$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, T, exec, wezterm
bind = $mainMod, E, exec, thunar
bind = $mainMod, A, exec, rofi -show drun
bind = SUPER CTRL, S, exec, ~/.config/hypr/scripts/cycle-shader.sh
bind = SUPER SHIFT, Z, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SUPER CTRL SHIFT, Z, exec, ~/.config/hypr/scripts/freeze-screenshot.sh

# bind = $mainMod, R, exec, hyde-shell screenrecord --start -- --audio
# bind = $mainMod ALT, R, exec, hyde-shell screenrecord --quit
#bindd = $mainMod Shift, Z, $d snip screen , exec, hyde-shell screenshot s # partial screenshot capture
#bindd = $mainMod+Ctrl+Shift, Z, $d freeze and snip screen, exec, hyde-shell screenshot sf # partial screenshot capture (frozen screen)
binddm = $mainMod, Z, $d hold to move window , movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow
bindd = Shift, F1, $d toggle fullscreen, fullscreen
#bindd = Shift, F2,  $d lock screen, exec, hyprlock
binddl  =  Shift, F3, $d pause media, exec, playerctl play-pause # toggle between media play and pause
binddl  =  Shift, F5, $d next media  , exec, playerctl next # media next
binddl  =  Shift, F4, $d  previous media , exec, playerctl previous # media previous
#bindd = $mainMod Ctrl, S, $d select shader, exec, pkill -x rofi || hyde-shell shaders.sh --select
bindd = $mainMod Shift, F, $d toggle pin on focused window, exec, hyde-shell window.pin
bindd = Control Alt, Delete, $d logout menu, exec, hyde-shell logoutlaunch
bindd = Control_L,Alt_R, $d toggle waybar and reload config, exec, hyde-shell waybar --hide

bind = SUPER SHIFT, C, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=chatgpt --name=chatgpt --app=https://chat.openai.com

bind = SUPER, Y, exec, brave --ozone-platform=wayland --profile-directory="youtube" --class=youtube --app=https://youtube.com
# Monkeytype
# bind = SUPER, M, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=monkeytype --app=https://monkeytype.com
# Notion
bind = SUPER, N, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=notion --app=https://www.notion.so/02917993852a4825ab25a38c938de4f8

bind = SUPER, D, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=whatsapp --app=https://web.whatsapp.com

bind = SUPER, G, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=gemini --app=https://gemini.google.com/u/1/app?hl=en-IN&pageId=none

bind = SUPER CTRL, A, exec,brave --ozone-platform=wayland --profile-directory="Default" --class=claude --app=https://claude.ai/new

bind = SUPER SHIFT, D, exec, brave --ozone-platform=wayland --profile-directory="Default" --class=todo --name=todo --app=https://to-do.live.com/tasks/inbox

# Zoom In (Super + Scroll Up)
bind = SUPER, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 + 2.0}')

# Zoom Out (Super + Scroll Down)
bind = SUPER, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 - 2.0}')

# Reset Zoom (Super + Backspace)
bind = SUPER, Backspace, exec, hyprctl keyword cursor:zoom_factor 1.0

bindd = $mainMod Shift, F, $d toggle pin on focused window, exec, hyde-shell window.pin
bindd = Control Alt, Delete, $d logout menu, exec, hyde-shell logoutlaunch

$d=[$wm|Resize Active Window]
# Resize windows
bindde = $mainMod Shift, Right, $d resize window right , resizeactive, 30 0
bindde = $mainMod Shift, Left, $d resize window left, resizeactive, -30 0
bindde = $mainMod Shift, Up, $d resize window up, resizeactive, 0 -30
bindde = $mainMod Shift, Down, $d resize  window down, resizeactive, 0 30

bindd = Control Shift, Escape, $d system monitor , exec, hyde-shell system.monitor
$d=[$l|Rofi menus]
