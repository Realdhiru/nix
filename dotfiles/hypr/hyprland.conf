source = env.conf
source = startup.conf
source = keybinds.conf
source = rules.conf
source = input.conf
source = appearance.conf
source = layout.conf
source = misc.conf

# 1. Dynamically generated internal monitor power state (bypasses DRM modeset)
source = ~/.cache/hypr_power_monitor.conf

# 1b. Persisted screen shader selection. Unlike a bare `hyprctl keyword`,
# anything sourced here survives every Hyprland reload automatically —
# including reloads triggered indirectly by other sourced files changing
# (e.g. hypr_power_monitor.conf above, rewritten by BatteryPopup.qml on
# every power-profile switch). See cycle-shader.sh, which is the only
# writer of this file.
source = ~/.cache/current_shader.conf

# 2. Universal fallback for ALL external monitors
monitor=,preferred,auto,2,bitdepth,10